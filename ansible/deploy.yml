---
- name: Deploy Student Feedback Application
  hosts: local
  become: yes

  vars:
    image_name: student-feedback-app
    container_name: feedback-container
    app_port: 5000

  tasks:

    - name: Ensure Docker is installed and running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Stop existing container (if running)
      docker_container:
        name: "{{ container_name }}"
        state: stopped
      ignore_errors: yes

    - name: Remove existing container (if exists)
      docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes

    - name: Pull latest Docker image
      docker_image:
        name: "{{ image_name }}"
        tag: latest
        source: local

    - name: Run the application container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}:latest"
        state: started
        restart_policy: always
        ports:
          - "{{ app_port }}:5000"

    - name: Verify container is running
      command: docker ps --filter "name={{ container_name }}" --format "{{ '{{' }}.Names{{ '}}' }}"
      register: container_status

    - name: Display deployment result
      debug:
        msg: "✅ Application deployed successfully! Access at http://localhost:{{ app_port }}"
